<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>בקשות רכש — אופק</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20100%20100'%3E%3Crect%20width='100'%20height='100'%20rx='22'%20fill='%231D9E75'/%3E%3Cg%20fill='none'%20stroke='%23ffffff'%20stroke-width='7'%20stroke-linecap='round'%20stroke-linejoin='round'%3E%3Cpath%20d='M22%2028h9l7%2032h33l7-22H36'/%3E%3Ccircle%20cx='42'%20cy='74'%20r='5'/%3E%3Ccircle%20cx='68'%20cy='74'%20r='5'/%3E%3C/g%3E%3C/svg%3E" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Assistant:wght@400;500;600;700&family=Heebo:wght@400;500&display=swap" rel="stylesheet" />
<style>
  :root{
    --cream:#F6F5F1; --card:#FFFFFF; --ink:#1F1D1A; --mut:#6B675F;
    --line:#E4E1D8; --acc:#1D9E75; --acc-d:#0F6E56; --acc-soft:#E1F5EE;
    --danger:#A32D2D; --danger-soft:#FCEBEB;
    --amber:#854F0B; --amber-soft:#FAEEDA;
    --blue:#185FA5; --blue-soft:#E6F1FB;
    --gray2:#5F5E5A; --gray-soft:#F1EFE8;
  }
  *{ box-sizing:border-box; margin:0; padding:0; }
  html,body{ background:var(--cream); color:var(--ink); font-family:'Heebo',sans-serif; }
  body{ min-height:100vh; padding:32px 20px 64px; }
  .wrap{ max-width:920px; margin:0 auto; }

  header.top{ display:flex; align-items:flex-end; justify-content:space-between; gap:16px; margin-bottom:24px; flex-wrap:wrap; }
  h1{ font-family:'Assistant',sans-serif; font-weight:700; font-size:31px; line-height:1.2; }
  .sub{ margin-top:4px; font-size:16px; color:var(--mut); }
  .topright{ display:flex; flex-direction:column; align-items:flex-end; gap:10px; }
  .today{ font-size:16px; color:var(--mut); display:inline-flex; align-items:center; gap:6px; white-space:nowrap; }
  .mode-btn{
    font-family:'Assistant',sans-serif; font-weight:500; font-size:15px; padding:8px 16px; cursor:pointer;
    background:var(--card); color:var(--ink); border:1px solid var(--line); border-radius:8px; transition:.15s;
    display:inline-flex; align-items:center; gap:6px;
  }
  .mode-btn:hover{ border-color:var(--acc); color:var(--acc-d); }
  body.edit-mode .mode-btn{ background:var(--acc); color:#fff; border-color:var(--acc); }

  .mode-banner{ display:none; background:var(--acc-soft); color:var(--acc-d); border:1px solid #BFE7D8;
    border-radius:8px; padding:10px 16px; font-size:15px; margin-bottom:20px; align-items:center; gap:8px; }
  body.edit-mode .mode-banner{ display:flex; }

  .panel{ background:var(--card); border:1px solid var(--line); border-radius:12px; padding:24px; margin-bottom:32px; }
  label{ display:block; font-family:'Assistant',sans-serif; font-weight:500; font-size:16px; margin-bottom:8px; }
  input[type=text]{
    width:100%; height:48px; font-family:'Heebo',sans-serif; font-size:16px; padding:0 16px;
    background:var(--cream); border:1px solid var(--line); border-radius:8px; color:var(--ink); transition:.15s;
  }
  input[type=text]::placeholder{ color:#A8A49B; }
  input[type=text]:focus{ outline:none; border-color:var(--acc); box-shadow:0 0 0 3px var(--acc-soft); }
  .mb16{ margin-bottom:16px; }

  .row{ display:flex; flex-wrap:wrap; align-items:flex-end; gap:16px; }
  .grow{ flex:1; min-width:220px; }
  .date-locked{
    height:48px; display:flex; align-items:center; gap:8px; padding:0 16px;
    background:var(--gray-soft); border:1px solid var(--line); border-radius:8px; color:var(--mut); font-size:16px; white-space:nowrap;
  }
  .btn{
    height:48px; font-family:'Assistant',sans-serif; font-weight:600; font-size:16px; padding:0 28px;
    background:var(--acc); color:#fff; border:none; border-radius:8px; cursor:pointer; transition:.15s;
    display:inline-flex; align-items:center; gap:8px;
  }
  .btn:hover{ background:var(--acc-d); }
  .btn:disabled{ opacity:.55; cursor:default; }

  .list-head{ display:flex; align-items:baseline; justify-content:space-between; margin-bottom:12px; padding:0 4px; }
  .list-head h2{ font-family:'Assistant',sans-serif; font-weight:600; font-size:20px; }
  .count{ font-size:16px; color:var(--mut); }

  .list{ display:flex; flex-direction:column; gap:12px; }
  .req{ background:var(--card); border:1px solid var(--line); border-radius:12px; padding:16px 20px; transition:.15s; }
  .req.fresh{ animation:pop .6s ease; }
  .req.done{ background:#FBFBF9; border-color:#EDEAE1; }
  .req.done .req-item{ color:var(--mut); }
  @keyframes pop{ from{ background:var(--acc-soft); } to{ background:var(--card); } }
  .req-top{ display:flex; align-items:flex-start; justify-content:space-between; gap:12px; }
  .req-item{ font-family:'Assistant',sans-serif; font-weight:600; font-size:18px; line-height:1.3; }
  .req-meta{ margin-top:6px; display:flex; flex-wrap:wrap; gap:16px; font-size:15px; color:var(--mut); }
  .req-meta i{ font-size:15px; vertical-align:-2px; margin-left:4px; }

  .pill{ font-family:'Assistant',sans-serif; font-weight:500; font-size:14px; padding:5px 12px; border-radius:999px; white-space:nowrap; }
  .pill.st-ממתין{ background:var(--amber-soft); color:var(--amber); }
  .pill.st-בטיפול{ background:var(--blue-soft); color:var(--blue); }
  .pill.st-סופק{ background:var(--acc-soft); color:var(--acc-d); }
  .pill.st-בוטל{ background:var(--gray-soft); color:var(--gray2); }

  .req-notes{ margin-top:10px; font-size:15px; color:var(--ink); background:var(--cream); border:1px solid var(--line);
    border-radius:8px; padding:10px 14px; display:flex; gap:8px; }
  .req-notes i{ color:var(--mut); font-size:16px; margin-top:2px; }
  .req-notes.empty{ color:#A8A49B; }

  /* edit controls */
  .edit-controls{ display:none; margin-top:12px; padding-top:12px; border-top:1px dashed var(--line); gap:12px; flex-wrap:wrap; align-items:flex-end; }
  body.edit-mode .edit-controls{ display:flex; }
  body.edit-mode .pill{ display:none; }
  .ec-field{ display:flex; flex-direction:column; gap:6px; }
  .ec-field label{ margin:0; font-size:14px; color:var(--mut); font-weight:500; }
  select, .notes-input{
    height:40px; font-family:'Heebo',sans-serif; font-size:15px; padding:0 12px; background:var(--card);
    border:1px solid var(--line); border-radius:8px; color:var(--ink);
  }
  select:focus, .notes-input:focus{ outline:none; border-color:var(--acc); box-shadow:0 0 0 3px var(--acc-soft); }
  .notes-input{ min-width:280px; flex:1; }

  .state{ background:var(--card); border:1px solid var(--line); border-radius:12px; padding:40px 20px; text-align:center; color:var(--mut); font-size:16px; }
  .state i{ font-size:28px; display:block; margin-bottom:10px; opacity:.6; }
  .err{ background:var(--danger-soft); color:var(--danger); border:1px solid #F0C9C9; border-radius:8px;
        padding:12px 16px; font-size:15px; margin-bottom:16px; display:none; }

  .toast{ position:fixed; bottom:24px; right:24px; background:var(--ink); color:#fff;
    font-family:'Assistant',sans-serif; font-weight:500; font-size:15px; padding:12px 18px; border-radius:10px;
    display:flex; align-items:center; gap:8px; opacity:0; transform:translateY(8px); transition:.25s; pointer-events:none; z-index:50; }
  .toast.show{ opacity:1; transform:translateY(0); }
  .toast i{ color:#5DCAA5; font-size:18px; }

  @media (max-width:560px){
    .req-top{ flex-direction:column; }
    .notes-input{ min-width:0; width:100%; }
  }
</style>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.7.0/dist/tabler-icons.min.css" />
</head>
<body>
  <div class="wrap">
    <header class="top">
      <div>
        <h1>בקשות רכש</h1>
        <p class="sub">רושמים מה צריך, מי הדורש — והתאריך נרשם אוטומטית.</p>
      </div>
      <div class="topright">
        <span class="today"><i class="ti ti-calendar"></i><span id="todayLabel"></span></span>
        <button class="mode-btn" id="modeBtn"><i class="ti ti-user-cog"></i><span id="modeLabel">מצב איש רכש</span></button>
      </div>
    </header>

    <div class="mode-banner"><i class="ti ti-pencil"></i>מצב עדכון פעיל — אפשר לשנות סטטוס ולכתוב הערות. שאר השדות נעולים.</div>

    <section class="panel">
      <div class="err" id="errBox"></div>
      <label for="item">מה צריך לרכוש?</label>
      <input type="text" id="item" class="mb16" placeholder='לדוגמה: שמן חיתוך 20 ליטר, מקדחים 8 מ&quot;מ, כפפות עבודה…' autocomplete="off" />
      <div class="row">
        <div class="grow">
          <label for="requester">שם הדורש</label>
          <input type="text" id="requester" placeholder="השם שלך" autocomplete="off" />
        </div>
        <div>
          <label style="color:var(--mut);">תאריך הבקשה</label>
          <div class="date-locked" title="נקבע אוטומטית, לא ניתן לשינוי">
            <i class="ti ti-lock"></i><span id="lockedDate"></span>
          </div>
        </div>
        <button class="btn" id="submitBtn"><i class="ti ti-plus"></i> שלח בקשה</button>
      </div>
    </section>

    <div class="list-head">
      <h2>בקשות פעילות</h2>
      <span class="count" id="count"></span>
    </div>

    <div id="list" class="list">
      <div class="state"><i class="ti ti-loader-2"></i>טוען בקשות…</div>
    </div>

    <section id="suppliedSection" style="display:none; margin-top:40px;">
      <div class="list-head">
        <h2 style="display:flex; align-items:center; gap:8px;"><i class="ti ti-circle-check" style="color:var(--acc); font-size:20px;"></i>בקשות שסופקו</h2>
        <span class="count" id="suppliedCount"></span>
      </div>
      <div id="suppliedList" class="list"></div>
    </section>
  </div>

  <div class="toast" id="toast"><i class="ti ti-circle-check"></i><span id="toastMsg">הבקשה נשלחה</span></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = "https://lsgwujpgwdusfqxamijv.supabase.co";
    const SUPABASE_KEY = "sb_publishable_Osz-jlvVA8H9Z50xhiGulQ_PB-UZxwb";
    const EDIT_PIN = "ofek2026"; // קוד למצב "איש רכש" — אפשר לשנות כאן
    const STATUSES = ["ממתין","בטיפול","סופק","בוטל"];
    const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    const $ = (id) => document.getElementById(id);
    const fmtDate = (iso) => new Date(iso).toLocaleDateString('he-IL', { day:'numeric', month:'long', year:'numeric' });
    const esc = (s) => String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

    const today = fmtDate(new Date().toISOString());
    $('todayLabel').textContent = today;
    $('lockedDate').textContent = today;

    function showErr(msg){ const e=$('errBox'); e.textContent=msg; e.style.display='block'; }
    function clearErr(){ $('errBox').style.display='none'; }
    let toastTimer;
    function toast(msg){ $('toastMsg').textContent = msg || 'הבקשה נשלחה'; const t=$('toast'); t.classList.add('show'); clearTimeout(toastTimer); toastTimer=setTimeout(()=>t.classList.remove('show'),2600); }

    let editMode = false;

    function statusOptions(current){
      return STATUSES.map(s => `<option value="${s}"${s===current?' selected':''}>${s}</option>`).join('');
    }

    function card(r, freshId){
      const hasNotes = r.notes && r.notes.trim();
      const done = r.status === 'סופק';
      return `
        <div class="req${done?' done':''}${r.id===freshId?' fresh':''}">
          <div class="req-top">
            <div>
              <div class="req-item">${esc(r.item)}</div>
              <div class="req-meta">
                <span><i class="ti ti-user"></i>${esc(r.requester)}</span>
                <span><i class="ti ti-calendar"></i>${fmtDate(r.created_at)}</span>
              </div>
            </div>
            <span class="pill st-${esc(r.status)}">${esc(r.status)}</span>
          </div>
          <div class="req-notes${hasNotes?'':' empty'}">
            <i class="ti ti-message-2"></i>
            <span>${hasNotes ? esc(r.notes) : 'אין הערות'}</span>
          </div>
          <div class="edit-controls">
            <div class="ec-field">
              <label>סטטוס</label>
              <select onchange="updateStatus('${r.id}', this.value)">${statusOptions(r.status)}</select>
            </div>
            <div class="ec-field" style="flex:1;">
              <label>הערת איש רכש</label>
              <input class="notes-input" type="text" value="${esc(r.notes)}" placeholder="הוסף הערה…"
                     onkeydown="if(event.key==='Enter')this.blur()"
                     onblur="updateNotes('${r.id}', this.value)" />
            </div>
          </div>
        </div>`;
    }

    function countLabel(n){ return n + (n === 1 ? ' בקשה' : ' בקשות'); }

    function render(data, freshId){
      const active = data.filter(r => r.status !== 'סופק');
      const supplied = data.filter(r => r.status === 'סופק');

      const list = $('list');
      if(!active.length){
        const msg = data.length ? 'אין בקשות פעילות — כולן סופקו 🎉' : 'אין בקשות עדיין. הוסיפו את הראשונה למעלה.';
        list.innerHTML = `<div class="state"><i class="ti ti-clipboard-list"></i>${msg}</div>`;
        $('count').textContent = '';
      } else {
        list.innerHTML = active.map(r => card(r, freshId)).join('');
        $('count').textContent = countLabel(active.length);
      }

      const sec = $('suppliedSection');
      if(supplied.length){
        sec.style.display = 'block';
        $('suppliedList').innerHTML = supplied.map(r => card(r, freshId)).join('');
        $('suppliedCount').textContent = countLabel(supplied.length);
      } else {
        sec.style.display = 'none';
        $('suppliedList').innerHTML = '';
      }
    }

    async function load(freshId){
      const { data, error } = await db.from('purchase_requests')
        .select('id,item,requester,created_at,status,notes').order('created_at', { ascending:false });
      if(error){ showErr('שגיאה בטעינת הבקשות: ' + error.message); return; }
      clearErr();
      render(data || [], freshId);
    }

    async function submit(){
      const item = $('item').value.trim();
      const requester = $('requester').value.trim();
      if(!item){ showErr('נא לכתוב מה צריך לרכוש.'); $('item').focus(); return; }
      if(!requester){ showErr('נא לרשום את שם הדורש.'); $('requester').focus(); return; }
      clearErr();
      const btn = $('submitBtn'); btn.disabled = true;
      const { data, error } = await db.from('purchase_requests')
        .insert({ item, requester }).select().single();
      btn.disabled = false;
      if(error){ showErr('שגיאה בשליחה: ' + error.message); return; }
      $('item').value = ''; $('requester').value = ''; $('item').focus();
      toast('הבקשה נשלחה');
      load(data ? data.id : null);
    }

    async function updateStatus(id, status){
      const { error } = await db.from('purchase_requests').update({ status }).eq('id', id);
      if(error){ showErr('שגיאה בעדכון סטטוס: ' + error.message); return; }
      toast('הסטטוס עודכן');
      load();
    }
    async function updateNotes(id, notes){
      const { error } = await db.from('purchase_requests').update({ notes: notes.trim() || null }).eq('id', id);
      if(error){ showErr('שגיאה בעדכון הערה: ' + error.message); return; }
      toast('ההערה נשמרה');
      load();
    }
    window.updateStatus = updateStatus;
    window.updateNotes = updateNotes;

    function toggleMode(){
      if(editMode){
        editMode = false; document.body.classList.remove('edit-mode');
        $('modeLabel').textContent = 'מצב איש רכש';
        return;
      }
      const pin = prompt('הזן קוד לעדכון סטטוס והערות:');
      if(pin === null) return;
      if(pin !== EDIT_PIN){ alert('קוד שגוי.'); return; }
      editMode = true; document.body.classList.add('edit-mode');
      $('modeLabel').textContent = 'סיום עדכון';
    }

    $('submitBtn').addEventListener('click', submit);
    $('modeBtn').addEventListener('click', toggleMode);
    document.addEventListener('keydown', (e) => {
      if(e.key === 'Enter' && (e.target.id === 'item' || e.target.id === 'requester')) submit();
    });

    db.channel('purchase_requests_live')
      .on('postgres_changes', { event:'*', schema:'public', table:'purchase_requests' },
          (payload) => { if(!editMode) load(payload.new ? payload.new.id : null); })
      .subscribe();

    load();
  </script>
</body>
</html>
